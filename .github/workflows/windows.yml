name: Makefile CI

on:
  workflow_dispatch:
  
jobs:
  build-windows-with-wine:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32 wget

      - name: Download and install Windows Python (3.12.0)
        run: |
          wget https://www.python.org/ftp/python/3.12.0/python-3.12.0-amd64.exe
          wine python-3.12.0-amd64.exe /quiet InstallAllUsers=1 PrependPath=1

      - name: Install pip and PyInstaller in Wine Python
        run: |
          wine python -m ensurepip
          wine python -m pip install --upgrade pip
          wine python -m pip install pyinstaller

      - name: Build Windows Executable with PyInstaller
        run: |
          # Run PyInstaller on your script (adjust main.py as needed)
          wine python -m PyInstaller --onefile main.py

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: uw-windows
          path: dist/main.exe
